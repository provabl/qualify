services:
  postgres:
    image: postgres:16-alpine
    container_name: qualify-postgres
    environment:
      POSTGRES_USER: qualify
      POSTGRES_PASSWORD: qualify_dev_password
      POSTGRES_DB: qualify
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qualify"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qualify-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        VERSION: ${VERSION:-dev}
        COMMIT_SHA: ${COMMIT_SHA:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: qualify-backend
    environment:
      PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: qualify
      DB_PASSWORD: qualify_dev_password
      DB_NAME: qualify
      DB_SSLMODE: disable
      MIGRATIONS_PATH: /app/migrations
      LOG_LEVEL: info
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - qualify-network
    restart: unless-stopped

  # Agent runs on the host alongside the researcher's AWS CLI session.
  # Uncomment to test agent in Docker:
  # agent:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.agent
  #   container_name: qualify-agent
  #   ports:
  #     - "8737:8737"
  #   networks:
  #     - qualify-network
  #   restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  qualify-network:
    driver: bridge
